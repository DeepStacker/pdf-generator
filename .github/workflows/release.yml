name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl pandas reportlab

      - name: Run tests
        run: python3 -m pytest tests/ -v

      - name: Get version
        id: version
        run: |
          V=$(python3 -c "exec(open('pdf_generator_ui.py').read()); print(VERSION)")
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=v$V" >> $GITHUB_OUTPUT

      - name: Check version change
        id: changed
        run: |
          git fetch --tags --force
          if git tag -l "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build distribution ZIP
        if: steps.changed.outputs.skip == 'false'
        run: python3 create_distribution_zip.py

      - name: Create Release
        if: steps.changed.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Audit Engine v${{ steps.version.outputs.version }}

            Auto-generated release. See commit history for changes.
          files: Audit_Engine_v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
