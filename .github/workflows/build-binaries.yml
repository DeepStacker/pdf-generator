name: Build & Release
on:
  push:
    branches: [main]
    paths: ["src/audit_engine/_version.py"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: extract
        run: |
          VERSION=$(grep -oE '__version__ = "[0-9.]+"' src/audit_engine/_version.py | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create tag if missing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.extract.outputs.tag }}"
          if ! git tag -l "$TAG" | grep -q .; then
            git tag "$TAG"
            git push origin "$TAG" 2>/dev/null || true
          fi
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.extract.outputs.tag }}" \
            --title "${{ steps.extract.outputs.tag }}" \
            --notes "" 2>/dev/null || true

  windows:
    needs: setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-win-
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pyinstaller
          key: pyi-win-${{ hashFiles('pdf_generator.spec') }}
          restore-keys: pyi-win-
      - run: pip install pyinstaller pywebview comtypes reportlab openpyxl "numpy<2" "pandas<2.2" certifi "sv-ttk"
      - name: Verify Tcl/Tk environment
        run: |
          python -c "import sys; print('Python:', sys.executable)"
          python -c "import _tkinter; print('_tkinter OK:', _tkinter.__file__)"
      - run: pyinstaller --noconfirm --clean pdf_generator.spec
      - name: Verify built exe
        shell: pwsh
        run: |
          $exe = "dist\Audit_Engine_Elite.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Built exe size: $([math]::Round($size, 2)) MB"
            Write-Host "Built exe path: $exe"
          } else {
            Write-Error "Build failed: exe not found!"
            exit 1
          }
      - name: Package and checksum
        shell: pwsh
        run: |
          $TAG = "${{ needs.setup.outputs.tag }}"
          Compress-Archive -Path dist\* -DestinationPath "Audit_Engine_${TAG}_binary_windows.zip"
          $hash = (Get-FileHash "Audit_Engine_${TAG}_binary_windows.zip" -Algorithm SHA256).Hash.ToLower()
          [System.IO.File]::WriteAllText("Audit_Engine_${TAG}_binary_windows.zip.sha256", $hash)
      - name: Upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $TAG = "${{ needs.setup.outputs.tag }}"
          gh release create $TAG --title $TAG --notes "" 2>$null; $true
          $zip = "Audit_Engine_${TAG}_binary_windows.zip"
          $sha = "$zip.sha256"
          gh release upload $TAG $zip $sha --clobber

  macos:
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-macos-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-macos-
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pyinstaller
          key: pyi-macos-${{ hashFiles('pdf_generator.spec') }}
          restore-keys: pyi-macos-
      - run: pip install pyinstaller pywebview reportlab openpyxl "numpy<2" "pandas<2.2" certifi "sv-ttk"
      - run: pyinstaller --noconfirm pdf_generator.spec
      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - dist/Audit_Engine_Elite.app 2>/dev/null \
            || codesign --force --deep --sign - dist/Audit_Engine_Elite || true
      - name: Package and checksum
        run: |
          TAG="${{ needs.setup.outputs.tag }}"
          cd dist
          if [ -d "Audit_Engine_Elite.app" ]; then
            zip -ry "../Audit_Engine_${TAG}_binary_macos.zip" "Audit_Engine_Elite.app"
          else
            zip -ry "../Audit_Engine_${TAG}_binary_macos.zip" .
          fi
          cd ..
          shasum -a 256 "Audit_Engine_${TAG}_binary_macos.zip" \
            | awk '{print $1}' > "Audit_Engine_${TAG}_binary_macos.zip.sha256"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.setup.outputs.tag }}"
          gh release create "$TAG" --title "$TAG" --notes "" 2>/dev/null || true
          ZIP="Audit_Engine_${TAG}_binary_macos.zip"
          SHA="${ZIP}.sha256"
          gh release upload "$TAG" "$ZIP" "$SHA" --clobber

  linux:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-linux-
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pyinstaller
          key: pyi-linux-${{ hashFiles('pdf_generator.spec') }}
          restore-keys: pyi-linux-
      - name: Install system dependencies (Linux GTK/WebKit2)
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf libgirepository-2.0-dev libcairo2-dev pkg-config gobject-introspection libgtk-3-dev libgdk-pixbuf2.0-bin libgtk-3-bin libglib2.0-bin libwebkit2gtk-4.1-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.1 gir1.2-girepository-3.0 gir1.2-soup-3.0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-libav
      - run: PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH}" pip install pyinstaller pywebview pygobject reportlab openpyxl "numpy<2" "pandas<2.2" certifi "sv-ttk" staticx
      - name: Query GI modules to seed PyInstaller cache
        run: |
          python3 -c "
          import gi
          gi.require_version('GIRepository', '3.0'); from gi.repository import GIRepository
          gi.require_version('Gtk', '3.0'); from gi.repository import Gtk, Gdk, GLib, Gio
          gi.require_version('WebKit2', '4.1'); from gi.repository import WebKit2
          gi.require_version('Soup', '3.0'); from gi.repository import Soup
          print('GI modules OK')
          "
      - name: Generate GTK runtime caches
        run: |
          # Generate GdkPixbuf loaders cache with @MEIPASS@ placeholder
          gdk-pixbuf-query-loaders /usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders/*.so \
            > gdk-pixbuf-loaders.cache
          sed -i 's|/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders/|@MEIPASS@/gdk-pixbuf-loaders/|g' \
            gdk-pixbuf-loaders.cache
          # Generate GTK immodules cache with @MEIPASS@ placeholder
          gtk-query-immodules-3.0 > gtk-immodules.cache
          sed -i 's|/usr/lib/x86_64-linux-gnu/gtk-3.0/3.0.0/immodules/|@MEIPASS@/gtk-immodules/|g' \
            gtk-immodules.cache
          # Compile GLib schemas
          sudo glib-compile-schemas /usr/share/glib-2.0/schemas/
      - run: pyinstaller --noconfirm pdf_generator.spec
      - name: Bundle all shared libraries with StaticX
        run: |
          staticx dist/Audit_Engine_Elite dist/Audit_Engine_Elite
          ls -lh dist/Audit_Engine_Elite
      - name: Package and checksum
        run: |
          TAG="${{ needs.setup.outputs.tag }}"
          cd dist
          tar czf "../Audit_Engine_${TAG}_binary_linux.tar.gz" .
          cd ..
          shasum -a 256 "Audit_Engine_${TAG}_binary_linux.tar.gz" \
            | awk '{print $1}' > "Audit_Engine_${TAG}_binary_linux.tar.gz.sha256"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.setup.outputs.tag }}"
          gh release create "$TAG" --title "$TAG" --notes "" 2>/dev/null || true
          TAR="Audit_Engine_${TAG}_binary_linux.tar.gz"
          SHA="${TAR}.sha256"
          gh release upload "$TAG" "$TAR" "$SHA" --clobber
