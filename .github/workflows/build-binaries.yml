name: Build Platform Binaries
on:
  push:
    branches:
      - main
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-win-
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pyinstaller
          key: pyi-win-${{ hashFiles('pdf_generator.spec') }}
          restore-keys: pyi-win-
      - run: pip install pyinstaller reportlab openpyxl "numpy<2" "pandas<2.2" certifi "sv-ttk"
      - name: Verify Tcl/Tk environment
        run: |
          python -c "import sys; print('Python:', sys.executable); print('Prefix:', sys.prefix); print('Base prefix:', sys.base_prefix)"
          python -c "import os, sys, glob; bases=[sys.prefix, getattr(sys,'base_prefix',sys.prefix)]; [print(f) for b in bases for f in glob.glob(os.path.join(b,'**','*.dll'),recursive=True) if any(x in f.lower() for x in ['tcl','tk','zlib'])]"
          python -c "import _tkinter; print('_tkinter OK:', _tkinter.__file__)"
          python -c "import tkinter; r=tkinter.Tk(); r.withdraw(); print('TCL_LIBRARY:', r.tk.exprstring('$tcl_library')); print('TK_LIBRARY:', r.tk.exprstring('$tk_library')); r.destroy(); print('tkinter fully operational')"
      - run: pyinstaller --noconfirm --clean pdf_generator.spec
      - name: Verify built exe
        shell: pwsh
        run: |
          $exe = "dist\Audit_Engine_Elite.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Built exe size: $([math]::Round($size, 2)) MB"
            Write-Host "Built exe path: $exe"
          } else {
            Write-Error "Build failed: exe not found!"
            exit 1
          }
      - name: Extract Version
        shell: bash
        run: |
          VERSION=$(grep -oE 'VERSION = "[0-9.]+"' pdf_generator_ui.py | cut -d '"' -f 2)
          echo "TAG=v$VERSION" >> $GITHUB_ENV
      - shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath "Audit_Engine_${env:TAG}_binary_windows.zip"
      - if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $zip = "Audit_Engine_${env:TAG}_binary_windows.zip"
          gh release upload $env:TAG $zip --clobber 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG --title $env:TAG --notes "Windows binary" 2>$null
            gh release upload $env:TAG $zip --clobber
          }

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-macos-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-macos-
      - uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pyinstaller
          key: pyi-macos-${{ hashFiles('pdf_generator.spec') }}
          restore-keys: pyi-macos-
      - run: pip install pyinstaller reportlab openpyxl "numpy<2" "pandas<2.2" "sv-ttk"
      - run: pyinstaller --noconfirm pdf_generator.spec
      - run: codesign --force --sign - dist/Audit_Engine_Elite
      - name: Extract Version
        shell: bash
        run: |
          VERSION=$(grep -oE 'VERSION = "[0-9.]+"' pdf_generator_ui.py | cut -d '"' -f 2)
          echo "TAG=v$VERSION" >> $GITHUB_ENV
      - run: cd dist && zip -r "../Audit_Engine_${TAG}_binary_macos.zip" .
      - if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${TAG}"
          ZIP="Audit_Engine_${TAG}_binary_macos.zip"
          gh release upload "$TAG" "$ZIP" --clobber 2>/dev/null || {
            gh release create "$TAG" --title "$TAG" --notes "macOS binary" 2>/dev/null || true
            gh release upload "$TAG" "$ZIP" --clobber
          }

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-linux-
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pyinstaller
          key: pyi-linux-${{ hashFiles('pdf_generator.spec') }}
          restore-keys: pyi-linux-
      - run: pip install pyinstaller reportlab openpyxl "numpy<2" "pandas<2.2" "sv-ttk"
      - run: pyinstaller --noconfirm pdf_generator.spec
      - name: Extract Version
        shell: bash
        run: |
          VERSION=$(grep -oE 'VERSION = "[0-9.]+"' pdf_generator_ui.py | cut -d '"' -f 2)
          echo "TAG=v$VERSION" >> $GITHUB_ENV
      - run: cd dist && zip -r "../Audit_Engine_${TAG}_binary_linux.zip" .
      - if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${TAG}"
          ZIP="Audit_Engine_${TAG}_binary_linux.zip"
          gh release upload "$TAG" "$ZIP" --clobber 2>/dev/null || {
            gh release create "$TAG" --title "$TAG" --notes "Linux binary" 2>/dev/null || true
            gh release upload "$TAG" "$ZIP" --clobber
          }
