name: Build Platform Binaries
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyinstaller reportlab openpyxl pandas
      - name: Build binary
        run: pyinstaller --noconfirm --clean pdf_generator.spec
      - name: Create ZIP
        shell: pwsh
        run: |
          $tag = "$env:TAG"
          Compress-Archive -Path dist\Audit_Engine_Elite\* -DestinationPath "Audit_Engine_${tag}_binary_windows.zip"
        env:
          TAG: ${{ github.ref_name }}
      - name: Upload to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view $env:TAG 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG --title $env:TAG --notes "Platform binary (Windows)"
          }
          gh release upload $env:TAG "Audit_Engine_${env:TAG}_binary_windows.zip" --clobber

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyinstaller reportlab openpyxl pandas
      - name: Build binary
        run: pyinstaller --noconfirm --clean pdf_generator.spec
      - name: Create ZIP
        run: |
          TAG="${{ github.ref_name }}"
          cd dist && zip -r "../Audit_Engine_${TAG}_binary_macos.zip" "Audit_Engine_Elite.app"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release view "$TAG" 2>/dev/null || gh release create "$TAG" --title "$TAG" --notes "Platform binary (macOS)"
          gh release upload "$TAG" "Audit_Engine_${TAG}_binary_macos.zip" --clobber

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyinstaller reportlab openpyxl pandas
      - name: Build binary
        run: pyinstaller --noconfirm --clean pdf_generator.spec
      - name: Create ZIP
        run: |
          TAG="${{ github.ref_name }}"
          cd dist && zip -r "../Audit_Engine_${TAG}_binary_linux.zip" "Audit_Engine_Elite"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release view "$TAG" 2>/dev/null || gh release create "$TAG" --title "$TAG" --notes "Platform binary (Linux)"
          gh release upload "$TAG" "Audit_Engine_${TAG}_binary_linux.zip" --clobber
